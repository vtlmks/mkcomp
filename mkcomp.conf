# mkcomp example configuration
# Copy to ~/.config/mkcomp/mkcomp.conf
#
# All values shown are defaults. Uncomment and modify as needed.
# Changes are picked up automatically (inotify) or on SIGHUP.

# background
# set bg_intensity to 0 to use your wallpaper
# bg_shader: noise (perlin) or warp (domain-warped FBM)
#bg_shader = noise
#bg_color = 1.0 1.0 1.0
#bg_color2 = 0.2 0.1 0.05
#bg_intensity = 0
#bg_speed = 1.0

# shadows
#shadow_radius = 20
#shadow_opacity = 0.6
#shadow_offset_x = 5
#shadow_offset_y = 5

# focus border
#border_color = 0.4 0.7 1.0
#border_width = 3
#urgent_border_color = 0.8 0.35 0.55

# window effects
#corner_radius = 12
#opacity = 1.0
#inactive_brightness = 1.0
#focus_transition_ms = 0
#fade_in_ms = 0
#fade_out_ms = 0
#blur_strength = 0

# per-window rules (match by WM_CLASS, case-insensitive)
# use xprop to find a window's class name
#
# available properties:
#   opacity=0.0-1.0      window opacity
#   shadow=on|off        enable/disable shadow
#   border=on|off        enable/disable focus/urgent border
#   corner_radius=N      corner radius in pixels
#   blur=on|off          enable/disable background blur
#
# examples:
#rule = class:Alacritty blur=on
#rule = class:polybar corner_radius=0 shadow=off
#
# firefox and other GTK/GNOME applications may render their own shadows
# and borders when they detect a compositor, causing ugly double shadows
# and thick borders. disable compositor shadows for these windows:
#rule = class:firefox shadow=off blur=off border=off
